[profiles.chat]
backend = "local-small"
# Tried in order if the primary backend is unreachable/errors. cloud-fast routes
# to Anthropic via the LiteLLM gateway, so chat keeps working if LM Studio is down.
fallback = ["cloud-fast"]
temperature = 0.7
max_tokens = 1024
# Approximate model context window; sizes the history token budget. Default 8192.
context_tokens = 8192
comms = "sync"
latency_class = "fast"

[profiles.fast]
backend = "cloud-fast"
comms = "sync"
latency_class = "fast"

[profiles.code]
backend = "cloud-heavy"
comms = "async"
latency_class = "slow"
idle_timeout_ms = 180000

[profiles.reason]
backend = "local-small"      # gemma (local)
fallback = ["cloud-heavy"]   # opus (via gateway) when gemma is unavailable
comms = "auto"
latency_class = "fast"

[profiles.research]
backend = "cloud-fast"
comms = "auto"
latency_class = "fast"

[routing.task_profiles]
code = "code"
design = "reason"
research = "research"
analysis = "reason"

[comms]
default_mode = "auto"
sync_budget_ms = 7000
idle_timeout_ms = 60000
absolute_ceiling_ms = 1800000
soft_worker_cap = 4
max_concurrent_children = 3
edit_debounce_ms = 600

# Per-room overrides. require_mention defaults to true globally.
# Set require_mention = false for rooms where the bot should respond to every message.
# Optional `system_prompt` overrides the global prompt for that room (supports {date}).
# Edit any of these and run `systemctl --user reload roger` (SIGHUP) to apply live.
[rooms."!PQIkeFGBzVPEyjiZIT:matrix.blastedstudios.com"]
name = "Roger Test - General"
require_mention = false

[rooms."!nogMOAyCJDGivqjSdK:matrix.blastedstudios.com"]
name = "Roger Test - Coding"
require_mention = false
# Route this room to a different LLM profile (see [profiles.*] above).
# Defaults to "chat" when unset; overridable live with `/model <profile>`.
profile = "reason"
system_prompt = """
You are Roger in a coding room. Be terse and technical. Prefer code over prose.
When asked for code, output a single fenced block with no preamble unless asked.
Today's date is {date}.
"""
