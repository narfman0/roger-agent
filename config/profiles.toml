[profiles.chat]
backend = "local-small"
temperature = 0.7
max_tokens = 1024
comms = "sync"
latency_class = "fast"

[profiles.fast]
backend = "cloud-fast"
comms = "sync"
latency_class = "fast"

[profiles.code]
backend = "cloud-heavy"
comms = "async"
latency_class = "slow"
idle_timeout_ms = 180000

[profiles.reason]
backend = "local-reason"
comms = "auto"
latency_class = "fast"

[profiles.research]
backend = "cloud-fast"
comms = "auto"
latency_class = "fast"

[routing.task_profiles]
code = "code"
design = "reason"
research = "research"
analysis = "reason"

[comms]
default_mode = "auto"
sync_budget_ms = 7000
idle_timeout_ms = 60000
absolute_ceiling_ms = 1800000
soft_worker_cap = 4
max_concurrent_children = 3
edit_debounce_ms = 600

# Per-room overrides. require_mention defaults to true globally.
# Set require_mention = false for rooms where the bot should respond to every message.
[rooms."!PQIkeFGBzVPEyjiZIT:matrix.blastedstudios.com"]
name = "Roger Test - General"
require_mention = false

[rooms."!nogMOAyCJDGivqjSdK:matrix.blastedstudios.com"]
name = "Roger Test - Coding"
require_mention = true
