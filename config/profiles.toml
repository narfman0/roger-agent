[profiles.chat]
backend = "local-small"
# Tried in order if the primary backend is unreachable/errors. cloud-fast routes
# to Anthropic via the LiteLLM gateway, so chat keeps working if Ollama is down.
fallback = ["cloud-fast"]
temperature = 0.7
max_tokens = 1024
# Approximate model context window; sizes the history token budget. Default 8192.
context_tokens = 8192
comms = "sync"

[profiles.fast]
backend = "cloud-fast"
comms = "sync"

# cloud-heavy is a kind = "claude-code" backend (see backends.example.toml): each
# turn spawns the claude CLI as an agentic subprocess in the room's workdir.
[profiles.code]
backend = "cloud-heavy"
comms = "async"
idle_timeout_ms = 180000
# Subprocess controls (claude-code/opencode only):
# bypassPermissions = full autonomy incl. shell; acceptEdits = file edits only, no bash.
permission_mode = "bypassPermissions"
# max_budget_usd = 2.0            # cost guard per turn (--max-budget-usd)
# max_turns = 30                  # agentic-turn cap (--max-turns)

[profiles.reason]
backend = "local-small"      # gemma via Ollama (local)
fallback = ["cloud-heavy"]   # opus (via gateway) when Ollama is unavailable
comms = "auto"

[profiles.research]
backend = "cloud-fast"
comms = "auto"

[profiles.opencode]
backend = "opencode-local"
comms = "async"
idle_timeout_ms = 180000
permission_mode = "bypassPermissions"

# Operating instructions layered into every room's system prompt (read fresh each
# turn — edits apply without a reload). A room may add its own via
# [rooms.*].operating_file, appended after this global one.
[context]
operating_file = "config/operating.md"

# Durable memory injected into the system prompt: a global file plus a per-room file
# under ~/.roger/memory/. Written by compaction (a later task); set enabled = false
# to turn injection off.
[memory]
enabled = true
# global_file = "~/.roger/memory/global.md"   # default when unset

# comms = sync | async | auto. sync awaits inline; async acks + runs in the
# background; auto starts inline and promotes to background past sync_budget_ms.
[comms]
sync_budget_ms = 7000
idle_timeout_ms = 60000
absolute_ceiling_ms = 1800000
soft_worker_cap = 4
max_concurrent_children = 3
edit_debounce_ms = 600
# Fallback cwd for agentic subprocess backends when no project has been selected
# for the room (host-specific path; ~ is expanded). Defaults to roger's own repo,
# which is guaranteed to exist on the deploy host; change to your usual project.
default_workdir = "~/.openclaw/workspace/roger-agent"

# Known projects the LLM can switch into via the `set_workdir` tool ("work on foo").
# The selection persists per-room in ~/.roger/room_workdirs.json. ~ is expanded.
# Add your real projects here.
[projects]
roger = "~/.openclaw/workspace/roger-agent"
# dotfiles = "~/dotfiles"

# Per-room overrides. require_mention defaults to true globally.
# Set require_mention = false for rooms where the bot should respond to every message.
# Optional `system_prompt` overrides the global prompt for that room (supports {date}).
# Edit any of these and run `systemctl --user reload roger` (SIGHUP) to apply live.
[rooms."!PQIkeFGBzVPEyjiZIT:matrix.blastedstudios.com"]
name = "Roger Test - General"
require_mention = false

[rooms."!nogMOAyCJDGivqjSdK:matrix.blastedstudios.com"]
name = "Roger Test - Coding"
require_mention = false
# Agentic coding: the `code` profile spawns claude-code (shell + filesystem) in the
# room's workdir. Switch to fast chat with `/model reason`, back with `/model code`.
profile = "code"
system_prompt = """
You are Roger's coding agent, working directly in a real project directory.
Read, edit, and create files and run shell commands as needed to do the task.
Be terse; report what you changed. Today's date is {date}.
"""

[rooms."!rszZkkpWTiCDQLaOpy:matrix.blastedstudios.com"]
name = "Roger Test - OpenCode"
require_mention = false
profile = "opencode"
system_prompt = """
You are Roger's opencode coding agent, powered by opencode.
Work directly in the project directory — read, edit, create files and run commands as needed.
Be terse; report what you changed. Today's date is {date}.
"""
